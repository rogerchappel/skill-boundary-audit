name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run check
        run: npm run check
      - name: Run test
        run: npm run test
      - name: Run smoke
        run: npm run smoke
      - name: Run build
        run: npm run build
      - name: Run package:smoke
        run: npm run package:smoke
